name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Clona il repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # -------------------------
      # BACKEND
      # -------------------------
      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Check backend (basic run)
        run: |
          cd backend
          node src/app.js &
          sleep 5
          echo "Backend started"

      # -------------------------
      # FRONTEND
      # -------------------------
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      # -------------------------
      # DONE
      # -------------------------
      - name: Success
        run: echo "Pipeline completed successfully 🚀"